# RookApp — PySide6 desktop build matrix.
#
# Builds the Qt app into a single-executable installer for each host
# OS using PyInstaller (GPL with bundling exception; the produced
# binary inherits the app's MIT licence, not GPL). Cross-compilation
# isn't viable for PyInstaller (each host produces its own platform),
# so the matrix pins to native runners.
#
# Triggered on:
#   - push to main (smoke-build; artifacts uploaded, not released)
#   - tags matching `rook-v*` → installers attached to the GitHub
#     release with the same name
#   - manual workflow_dispatch

name: RookApp Desktop

on:
  push:
    branches: [main]
    tags: ["rook-v*"]
    paths:
      - "edgevox/**"
      - "pyproject.toml"
      - ".github/workflows/rookapp-desktop.yml"
  pull_request:
    paths:
      - "edgevox/apps/**"
      - ".github/workflows/rookapp-desktop.yml"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm
            runner: macos-14
            ext: dmg
          - name: macos-intel
            runner: macos-13
            ext: dmg
          - name: windows
            runner: windows-latest
            ext: exe
          - name: linux
            runner: ubuntu-22.04
            ext: AppImage

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ---- Platform-specific system deps ----
      # PySide6 wheels are self-contained, but stockfish (used at
      # runtime by the agent) is installed separately per OS, and
      # Linux needs a handful of X libs for pyinstaller bundling.
      - name: Install Linux system deps
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            stockfish \
            libxcb-cursor0 \
            libxkbcommon-x11-0 \
            fuse libfuse2

      - name: Install macOS system deps
        if: startsWith(matrix.runner, 'macos-')
        run: brew install stockfish

      - name: Install Windows system deps
        if: matrix.runner == 'windows-latest'
        # Stockfish for Windows via winget would require elevation;
        # prefer bundling a static binary under ``assets/`` at build
        # time if you want full offline experience. For now we trust
        # that users have it on PATH.
        run: echo "stockfish must be provided by the user on Windows"

      - name: Install edgevox with desktop extras
        run: pip install -e ".[desktop]" pyinstaller

      - name: Build executable (PyInstaller)
        shell: bash
        run: |
          pyinstaller \
            --name RookApp \
            --onefile \
            --windowed \
            --hidden-import edgevox.apps.chess_robot_qt \
            --collect-submodules edgevox \
            -p . \
            rookapp_entry.py || true
          # If the entry shim doesn't exist, create it and retry once.
          if [ ! -d dist ]; then
            python -c "from edgevox.apps.chess_robot_qt.main import main; main()" || true
            cat > rookapp_entry.py <<'PY'
          from edgevox.apps.chess_robot_qt.main import main
          if __name__ == "__main__":
              main()
          PY
            pyinstaller --name RookApp --onefile --windowed \
              --hidden-import edgevox.apps.chess_robot_qt \
              --collect-submodules edgevox \
              -p . rookapp_entry.py
          fi
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: rookapp-${{ matrix.name }}
          path: dist/*
          if-no-files-found: warn
          retention-days: 7

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/rook-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -la release-assets/

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
