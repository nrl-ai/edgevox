name: Bug report
description: Something works wrong, crashes, or produces incorrect output.
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `edgevox-agent robot-panda --text-mode`
        2. Type "pick up the cup"
        3. Observe ...
    validations:
      required: true

  - type: input
    id: hardware
    attributes:
      label: Hardware
      placeholder: e.g. RTX 3080 / M2 Pro / CPU only
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Ubuntu 24.04 / macOS 14.5 / Windows 11
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. 3.12.4
    validations:
      required: true

  - type: input
    id: edgevox-version
    attributes:
      label: EdgeVox version
      description: Output of `pip show edgevox | grep Version`, or the commit SHA if running from source.
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: STT / LLM / TTS in use
      placeholder: e.g. faster-whisper-base + gemma-4-e2b + kokoro-en

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste output captured with `EDGEVOX_LOG_LEVEL=DEBUG` if available.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have searched [existing issues](https://github.com/nrl-ai/edgevox/issues) and this is not a duplicate.
          required: true
